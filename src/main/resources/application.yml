spring:
  application:
    name: poc-pos
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/poc_pos}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${APP_ENVIRONMENT:local}

app:
  security:
    hmac:
      secret: ${HMAC_SECRET:change-me}
      allowed-clock-skew: 5m
      replay-ttl: 5m
  payment-processor:
    base-url: ${PAYMENT_PROCESSOR_BASE_URL:http://localhost:8081}
    timeout:
      connect: 500ms
      read: 2s
    paths:
      authorize: /authorize
      confirm: /confirm
      void: /void
  flagsmith:
    base-url: ${FLAGSMITH_BASE_URL:http://localhost:8010}
    environment-key: ${FLAGSMITH_ENVIRONMENT_KEY:local-dev-key}
    features:
      authorize-flow: authorize-flow
      retry-profile: retry-profile
      risk-engine: risk-engine

resilience4j:
  retry:
    instances:
      paymentProcessor:
        max-attempts: 3
        wait-duration: 300ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        enable-randomized-wait: true
        randomized-wait-factor: 0.5
        retry-exceptions:
          - org.springframework.web.client.RestClientException
          - java.util.concurrent.TimeoutException
  circuitbreaker:
    instances:
      paymentProcessor:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
  bulkhead:
    instances:
      paymentProcessor:
        max-concurrent-calls: 20
        max-wait-duration: 0
