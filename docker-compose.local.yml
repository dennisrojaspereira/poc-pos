services:
  postgres:
    image: postgres:16-alpine
    container_name: poc-pos-postgres
    environment:
      POSTGRES_DB: poc_pos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d poc_pos"]
      interval: 5s
      timeout: 5s
      retries: 20

  payment-processor-mock:
    image: wiremock/wiremock:3.9.1
    container_name: poc-pos-payment-processor-mock
    command: ["--global-response-templating", "--verbose"]
    ports:
      - "8081:8080"
    volumes:
      - ./infra/wiremock/mappings:/home/wiremock/mappings

  merchant-postgres:
    image: postgres:16-alpine
    container_name: poc-merchant-postgres
    environment:
      POSTGRES_DB: merchant_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d merchant_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  keycloak:
    image: quay.io/keycloak/keycloak:26.1.4
    container_name: poc-pos-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    volumes:
      - ./infra/keycloak/realm-poc-pos.json:/opt/keycloak/data/import/realm-poc-pos.json:ro

  opa:
    image: openpolicyagent/opa:0.70.0
    container_name: poc-pos-opa
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "/policies"
    ports:
      - "8181:8181"
    volumes:
      - ./infra/opa/policies:/policies:ro

  merchant-service:
    build:
      context: ./merchant-service
    container_name: poc-merchant-service
    depends_on:
      merchant-postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      opa:
        condition: service_started
    environment:
      DB_URL: jdbc:postgresql://merchant-postgres:5432/merchant_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      IDP_ISSUER_URI: http://localhost:8180/realms/poc-pos
      IDP_JWK_SET_URI: http://keycloak:8080/realms/poc-pos/protocol/openid-connect/certs
      OPA_URL: http://opa:8181/v1/data/merchant/authz/allow
    ports:
      - "8083:8080"

  prometheus:
    image: prom/prometheus:v3.3.1
    container_name: poc-pos-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  tempo:
    image: grafana/tempo:2.7.1
    container_name: poc-pos-tempo
    command:
      - "-config.file=/etc/tempo.yml"
    ports:
      - "3200:3200"
      - "4318:4318"
    volumes:
      - ./infra/tempo/tempo.yml:/etc/tempo.yml:ro

  grafana:
    image: grafana/grafana:11.6.0
    container_name: poc-pos-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
