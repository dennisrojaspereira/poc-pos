services:
  postgres:
    image: postgres:16-alpine
    container_name: poc-pos-postgres
    environment:
      POSTGRES_DB: poc_pos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d poc_pos"]
      interval: 5s
      timeout: 5s
      retries: 20

  payment-processor-mock:
    image: wiremock/wiremock:3.9.1
    container_name: poc-pos-payment-processor-mock
    command: ["--global-response-templating", "--verbose"]
    ports:
      - "8081:8080"
    volumes:
      - ./infra/wiremock/mappings:/home/wiremock/mappings

  prometheus:
    image: prom/prometheus:v3.3.1
    container_name: poc-pos-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  tempo:
    image: grafana/tempo:2.7.1
    container_name: poc-pos-tempo
    command:
      - "-config.file=/etc/tempo.yml"
    ports:
      - "3200:3200"
      - "4318:4318"
    volumes:
      - ./infra/tempo/tempo.yml:/etc/tempo.yml:ro

  grafana:
    image: grafana/grafana:11.6.0
    container_name: poc-pos-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
